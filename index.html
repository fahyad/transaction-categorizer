// Storage helpers using localStorage

set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} },
del(key) { try { localStorage.removeItem(key); } catch(e) {} }
};

function parseCSVLine(line) {
const fields = []; let current = “”; let inQ = false;
for (let i = 0; i < line.length; i++) {
const ch = line[i];
if (ch === ‘”’) { if (inQ && line[i+1] === ‘”’) { current += ‘”’; i++; } else inQ = !inQ; }
else if (ch === ‘,’ && !inQ) { fields.push(current.trim()); current = “”; }
else current += ch;
}
fields.push(current.trim());
return fields;
}

function parseCSV(text) {
const lines = text.trim().split(”\n”).map(l => l.trim()).filter(l => l.length > 0);
if (lines.length < 2) return [];
const txns = [];
for (let i = 1; i < lines.length; i++) {
const f = parseCSVLine(lines[i]);
if (f.length < 7) continue;
const [, date, desc, subDesc, status, txnType, amountStr] = f;
if (!date || !amountStr) continue;
const num = parseFloat(amountStr);
if (isNaN(num)) continue;
if (desc.toLowerCase().includes(“payment from”)) continue;
const amt = txnType === “Debit” ? -Math.abs(num) : Math.abs(num);
const payee = desc.split(”#”)[0].split(/\d{3}-\d{3}/).at(0)?.trim() || desc;
txns.push({ id: String(i), date, amount: amt, status, payee: payee.charAt(0).toUpperCase() + payee.slice(1), rawDesc: desc, subDesc: subDesc || “”, category: null });
}
return txns;
}

function ManageScreen({ categories, onAdd, onDelete, onBack }) {

const [name, setName] = useState(””); const [emoji, setEmoji] = useState(”\u2B50”); const [group, setGroup] = useState(“Other”);
const [confirmDel, setConfirmDel] = useState(null);

e(“h2”, { style: { fontSize: 18, fontWeight: 800, margin: 0 } }, “Categories”),
e(“button”, { onClick: onBack, style: { background: “none”, border: “1px solid #3D4470”, borderRadius: 6, color: “#9BA4B5”, padding: “4px 12px”, cursor: “pointer”, fontSize: 12 } }, “\u2190 Back”)

) : e(“button”, { onClick: () => setConfirmDel(cat.name), style: { background: “none”, border: “none”, color: “#3D4470”, cursor: “pointer”, fontSize: 16, padding: “0 4px” } }, “\u2715”)
) : e(“span”, { style: { fontSize: 10, color: “#3D4470” } }, “default”)
))
);
}),
!adding ? e(“button”, { onClick: () => setAdding(true), style: { …S.primaryBtn, width: “100%”, marginTop: 12 } }, “+ Add Category”) :

canUndo && e(“button”, { onClick: onUndo, style: S.undoBtn }, “\u21A9 Undo”)),

e(“div”, { style: { display: “flex”, justifyContent: “space-between”, alignItems: “flex-start” } },
e(“div”, null,
e(“div”, { style: { fontSize: 12, color: “#9BA4B5”, fontFamily: “monospace”, marginBottom: 2 } }, txn.date),

e(“button”, { onClick: () => setSelGroup(null), style: { …S.groupPill, background: !selGroup ? “#6C63FF” : “#2A2F5A”, color: !selGroup ? “#FFF” : “#9BA4B5” } }, “All”),
GROUP_ORDER.filter(g => activeGroups.includes(g)).map(g =>
e(“button”, { key: g, onClick: () => setSelGroup(g === selGroup ? null : g),
style: { …S.groupPill, background: selGroup === g ? GROUP_COLORS[g] + “33” : “#2A2F5A”, color: selGroup === g ? GROUP_COLORS[g] : “#9BA4B5”, borderColor: selGroup === g ? GROUP_COLORS[g] : “#3D4470” } }, g))),
e(“div”, { style: { display: “grid”, gridTemplateColumns: “repeat(3, 1fr)”, gap: 8, marginBottom: 12 } },
cats.map(cat => e(“button”, { key: cat.name, onClick: () => { onAssign(txn.id, cat.name); setSelGroup(null); }, style: S.catBtn },
e(“span”, { style: { fontSize: 22 } }, cat.emoji),
e(“span”, { style: { fontSize: 11, fontWeight: 600, color: “#E5E7EB”, lineHeight: 1.2 } }, cat.name)))),
e(“button”, { onClick: () => onSkip(txn.id), style: { …S.skipBtn, width: “100%” } }, “Skip this transaction”))
);
}

function SummaryScreen({ transactions, categories, onCopy, onBack, onRestart, copied }) {
const catMap = Object.fromEntries(categories.map(c => [c.name, c]));
const categorized = transactions.filter(t => t.category && t.category !== SKIP_CAT);
const skipped = transactions.filter(t => t.category === SKIP_CAT);
const uncategorized = transactions.filter(t => !t.category);
const total = Math.abs(categorized.reduce((s, t) => s + t.amount, 0));
const byCat = {};
categorized.forEach(t => { if (!byCat[t.category]) byCat[t.category] = { items: [], total: 0 }; byCat[t.category].items.push(t); byCat[t.category].total += t.amount; });

return e(“div”, { style: S.screen },
e(“div”, { style: { padding: “20px 16px” } },
e(“h2”, { style: { fontSize: 20, fontWeight: 800, marginBottom: 4 } }, “Summary”),
e(“p”, { style: { color: “#9BA4B5”, fontSize: 13, marginBottom: 16 } }, categorized.length + “ categorized \u00B7 “ + skipped.length + “ skipped \u00B7 “ + uncategorized.length + “ remaining”),
e(“div”, { style: { …S.txnCard, textAlign: “center”, marginBottom: 16 } },
e(“div”, { style: { color: “#9BA4B5”, fontSize: 12, marginBottom: 4 } }, “TOTAL CATEGORIZED SPENDING”),
e(“div”, { style: { fontSize: 32, fontWeight: 800, color: “#F87171” } }, “$” + total.toFixed(2))),
e(“div”, { style: { marginBottom: 20 } },
Object.entries(byCat).sort((a, b) => a[1].total - b[1].total).map(([cat, data]) => {
const info = catMap[cat];
return e(“div”, { key: cat, style: { display: “flex”, alignItems: “center”, padding: “8px 0”, borderBottom: “1px solid #2A2F5A” } },
e(“span”, { style: { fontSize: 18, width: 30 } }, info?.emoji || “\u{1F4E6}”),
e(“span”, { style: { flex: 1, fontSize: 13, fontWeight: 600 } }, cat),
e(“span”, { style: { fontSize: 12, color: “#9BA4B5”, marginRight: 8 } }, data.items.length + “x”),
e(“span”, { style: { fontSize: 14, fontWeight: 700, color: “#F87171”, fontFamily: “monospace” } }, “$” + Math.abs(data.total).toFixed(2)));
})),
e(“button”, { onClick: onCopy, style: { …S.primaryBtn, width: “100%”, marginBottom: 10 } }, copied ? “\u2713 Copied to Clipboard!” : “\u{1F4CB} Copy “ + categorized.length + “ for Excel”),
e(“div”, { style: { display: “flex”, gap: 10 } },
uncategorized.length > 0 && e(“button”, { onClick: onBack, style: { …S.bigBtn, flex: 1, background: “#2A2F5A”, color: “#FFF” } }, “\u2190 “ + uncategorized.length + “ remaining”),
e(“button”, { onClick: onRestart, style: { …S.bigBtn, flex: 1, background: “#1B1F3B”, border: “1px solid #3D4470”, color: “#9BA4B5” } }, “New CSV”))
)
);
}

function App() {
const [txns, setTxns] = useState([]);
const [mappings, setMappings] = useState({});
const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
const [phase, setPhase] = useState(“input”);
const [copied, setCopied] = useState(false);
const [history, setHistory] = useState([]);
const [initKnown, setInitKnown] = useState(0);

useEffect(() => {
const m = storage.get(“cat-mappings”); if (m) setMappings(m);
const c = storage.get(“custom-cats”); if (c) setCategories([…DEFAULT_CATEGORIES, …c]);
}, []);

const saveMap = m => { setMappings(m); storage.set(“cat-mappings”, m); };
const saveCats = allCats => { storage.set(“custom-cats”, allCats.filter(c => !DEFAULT_CATEGORIES.some(d => d.name === c.name))); };

const pushH = (id, prevCat, prevConf, ph) => setHistory(h => […h, { id, prevCat, prevConf, phase: ph }]);
const undo = () => {
if (!history.length) return;
const last = history[history.length - 1];
setHistory(h => h.slice(0, -1));
setTxns(p => p.map(t => t.id === last.id ? { …t, category: last.prevCat, confirmed: last.prevConf } : t));
if (last.phase !== phase) setPhase(last.phase);
};

const handleParse = parsed => {
setHistory([]);
const w = parsed.map(t => { const s = mappings[t.payee.toLowerCase()]; return s ? { …t, category: s } : t; });
setTxns(w);
const k = w.filter(t => t.category).length;
setInitKnown(k);
setPhase(k > 0 ? “confirm” : “categorize”);
};

const known = txns.filter(t => t.category && t.category !== SKIP_CAT && !t.confirmed);
const unknown = txns.filter(t => !t.category);
const done = txns.filter(t => t.confirmed || t.category === SKIP_CAT).length;
const progress = txns.length > 0 ? (done / txns.length * 100) : 0;

const confirm = id => { const t = txns.find(x => x.id === id); pushH(id, t.category, t.confirmed, “confirm”); setTxns(p => p.map(x => x.id === id ? { …x, confirmed: true } : x)); if (known.filter(x => x.id !== id).length === 0) setPhase(unknown.length > 0 ? “categorize” : “summary”); };
const reject = id => { const t = txns.find(x => x.id === id); pushH(id, t.category, t.confirmed, “confirm”); setTxns(p => p.map(x => x.id === id ? { …x, category: null, confirmed: false } : x)); };
const assign = (id, cat) => { const t = txns.find(x => x.id === id); pushH(id, t.category, t.confirmed, phase); setTxns(p => p.map(x => x.id === id ? { …x, category: cat, confirmed: true } : x)); if (t && cat !== SKIP_CAT) saveMap({ …mappings, [t.payee.toLowerCase()]: cat }); if (unknown.filter(x => x.id !== id).length === 0) setTimeout(() => setPhase(“summary”), 200); };
const skip = id => { const t = txns.find(x => x.id === id); pushH(id, t.category, t.confirmed, phase); setTxns(p => p.map(x => x.id === id ? { …x, category: SKIP_CAT, confirmed: true } : x)); if (unknown.filter(x => x.id !== id).length === 0) setTimeout(() => setPhase(“summary”), 200); };
const copy = () => { const rows = txns.filter(t => t.category && t.category !== SKIP_CAT).map(t => t.date + “\t” + t.payee + “\t” + t.category + “\t” + t.subDesc + “\t” + t.amount).join(”\n”); navigator.clipboard.writeText(rows).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }); };

if (phase === “input”) return e(InputScreen, { onParse: handleParse, mappingCount: Object.keys(mappings).length, catCount: categories.length, onManage: () => setPhase(“manage”) });
if (phase === “manage”) return e(ManageScreen, { categories, onAdd: cat => { if (categories.some(c => c.name.toLowerCase() === cat.name.toLowerCase())) return; const u = […categories, cat]; setCategories(u); saveCats(u); }, onDelete: name => { const u = categories.filter(c => c.name !== name); setCategories(u); saveCats(u); }, onBack: () => setPhase(“input”) });
if (phase === “confirm” && known.length > 0) return e(ConfirmScreen, { txn: known[0], onConfirm: confirm, onReject: reject, onSkipAll: () => { setTxns(p => p.map(t => t.category && !t.confirmed ? { …t, confirmed: true } : t)); setPhase(unknown.length > 0 ? “categorize” : “summary”); }, onUndo: undo, canUndo: history.length > 0, remaining: known.length, total: initKnown });
if ((phase === “categorize” || phase === “confirm”) && unknown.length > 0) return e(CategorizeScreen, { txn: unknown[0], categories, onAssign: assign, onSkip: skip, onDone: () => setPhase(“summary”), onUndo: undo, canUndo: history.length > 0, progress, remaining: unknown.length });
return e(SummaryScreen, { transactions: txns, categories, onCopy: copy, onBack: () => setPhase(“categorize”), onRestart: () => { setTxns([]); setPhase(“input”); setCopied(false); setHistory([]); }, copied });
}

ReactDOM.createRoot(document.getElementById(“root”)).render(e(App));
</script>

</body>
</html>
