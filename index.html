const SKIP_CAT = "__SKIP__";
const GROUP_ORDER = ["Living", "Nice Things", "Fixed", "Travel", "Money", "Other"];
const GROUP_COLORS = { Living: "#34D399", "Nice Things": "#F9A8D4", Fixed: "#FB923C", Travel: "#22D3EE", Money: "#FBBF24", Other: "#A3A3A3" };

// Storage helpers using localStorage
const storage = {
  get(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} },
  del(key) { try { localStorage.removeItem(key); } catch(e) {} }
};

// Transform sheet data to transaction format
function transformSheetTransaction(row) {
  const isDebit = row.transactionType && (row.transactionType.toLowerCase().includes("authorization") || row.transactionType.toLowerCase().includes("purchase") || row.transactionType.toLowerCase().includes("withdrawal"));
  const amount = parseFloat(row.amount) || 0;
  const amt = isDebit ? -Math.abs(amount) : Math.abs(amount);
  const merchant = row.merchant || "";
  const payee = merchant.charAt(0).toUpperCase() + merchant.slice(1);
  const subDesc = (row.accountType || "") + (row.accountType && row.account ? " " : "") + (row.account || "");
  return {
    id: String(row.row),
    date: row.date ? (typeof row.date === "string" ? row.date : new Date(row.date).toISOString().split("T")[0]) : "",
    amount: amt,
    payee: payee,
    rawDesc: merchant,
    subDesc: subDesc,
    category: null,
    sheetRow: row.row,
    timeET: row.timeET || "",
    transactionType: row.transactionType || "",
    accountType: row.accountType || "",
  };
}

// Sync queue for POST updates with retry
const syncManager = {
  queue: [],
  listeners: [],
  subscribe(fn) { syncManager.listeners.push(fn); return () => { syncManager.listeners = syncManager.listeners.filter(l => l !== fn); }; },
  notify() { syncManager.listeners.forEach(fn => fn({ pending: syncManager.queue.filter(i => i.status === "pending").length, failed: syncManager.queue.filter(i => i.status === "failed").length, total: syncManager.queue.length })); },
  add(row, category) {
    syncManager.queue.push({ row, category, status: "pending", retries: 0 });
    syncManager.notify();
    syncManager.flush();
  },
  async flush() {
    const pending = syncManager.queue.filter(i => i.status === "pending" || i.status === "failed");
    if (!pending.length) return;
    const url = storage.get("webapp-url");
    if (!url) return;
    for (const item of pending) {
      item.status = "sending";
      syncManager.notify();
      try {
        const resp = await fetch(url, { method: "POST", body: JSON.stringify({ updates: [{ row: item.row, category: item.category }] }), redirect: "follow" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        item.status = "done";
        syncManager.notify();
      } catch (err) {
        item.retries++;
        if (item.retries >= 3) { item.status = "failed"; } else { item.status = "pending"; }
        syncManager.notify();
        if (item.status === "pending") {
          await new Promise(r => setTimeout(r, 1000 * Math.pow(2, item.retries)));
          syncManager.flush();
          return;
        }
      }
    }
    syncManager.queue = syncManager.queue.filter(i => i.status !== "done");
    syncManager.notify();
  },
  retryFailed() {
    syncManager.queue.forEach(i => { if (i.status === "failed") { i.status = "pending"; i.retries = 0; } });
    syncManager.notify();
    syncManager.flush();
  },
  clearDone() { syncManager.queue = syncManager.queue.filter(i => i.status !== "done"); syncManager.notify(); }
};

function SyncIndicator() {
  const [sync, setSync] = useState({ pending: 0, failed: 0, total: 0 });
  useEffect(() => syncManager.subscribe(setSync), []);
  if (sync.pending === 0 && sync.failed === 0) return null;
  return e("div", { style: { position: "fixed", bottom: 16, left: "50%", transform: "translateX(-50%)", zIndex: 999, display: "flex", gap: 8, alignItems: "center", background: sync.failed > 0 ? "#7F1D1D" : "#1E3A5F", border: "1px solid " + (sync.failed > 0 ? "#F87171" : "#3B82F6"), borderRadius: 10, padding: "8px 16px", fontSize: 12, fontWeight: 600 } },
    sync.pending > 0 && e("span", { style: { color: "#93C5FD" } }, "\u21BB Syncing " + sync.pending + "..."),
    sync.failed > 0 && e("span", { style: { color: "#F87171" } }, "\u26A0 " + sync.failed + " failed"),
    sync.failed > 0 && e("button", { onClick: () => syncManager.retryFailed(), style: { background: "#F87171", border: "none", borderRadius: 6, color: "#FFF", padding: "4px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", marginLeft: 4 } }, "Retry"));
}

const S = {
  screen: { background: "#1B1F3B", minHeight: "100vh", minHeight: "100dvh", color: "#FFFFFF", fontFamily: "system-ui, -apple-system, sans-serif" },
  txnCard: { background: "#2A2F5A", borderRadius: 14, padding: "20px 18px", marginBottom: 12, marginTop: 8 },
  primaryBtn: { background: "#6C63FF", color: "#FFF", border: "none", borderRadius: 10, padding: "14px 24px", fontSize: 16, fontWeight: 700, cursor: "pointer" },
  bigBtn: { border: "none", borderRadius: 10, padding: "14px", fontSize: 15, fontWeight: 700, cursor: "pointer" },
  catBtn: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4, background: "#2A2F5A", border: "1px solid #3D4470", borderRadius: 12, padding: "14px 6px", cursor: "pointer", minHeight: 64 },
  skipBtn: { background: "none", border: "1px dashed #3D4470", borderRadius: 10, padding: "12px", color: "#6B7280", fontSize: 13, cursor: "pointer" },
  groupPill: { border: "1px solid #3D4470", borderRadius: 20, padding: "4px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", background: "#2A2F5A", color: "#9BA4B5" },
  progressBar: { background: "#2A2F5A", borderRadius: 4, height: 5, overflow: "hidden", marginBottom: 12 },
  undoBtn: { background: "#2A2F5A", border: "1px solid #3D4470", borderRadius: 6, color: "#FBBF24", padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600 },
};

function sessionLabel(txns) {
  const dates = txns.map(t => t.date).filter(Boolean).sort();
  if (!dates.length) return "No dates";
  const fmt = d => { const p = d.split("-"); return new Date(p[0], p[1]-1, p[2]).toLocaleDateString("en-US", { month: "short", day: "numeric" }); };
  if (dates.length === 1) return fmt(dates[0]);
  return fmt(dates[0]) + " \u2013 " + fmt(dates[dates.length - 1]);
}

function sessionStats(txns) {
  const total = txns.length;
  const catd = txns.filter(t => t.category && t.category !== SKIP_CAT && t.confirmed).length;
  const skipped = txns.filter(t => t.category === SKIP_CAT).length;
  const remaining = total - catd - skipped;
  const pct = total > 0 ? Math.round((catd / total) * 100) : 0;
  return { total, catd, skipped, remaining, pct };
}

function SettingsModal({ onClose, onSave }) {
  const [url, setUrl] = useState(storage.get("webapp-url") || "");
  const [err, setErr] = useState("");

  const handleSave = () => {
    const trimmed = url.trim();
    if (!trimmed) {
      setErr("Please enter a URL");
      return;
    }
    storage.set("webapp-url", trimmed);
    onSave(trimmed);
  };

  return e("div", { style: { position: "fixed", inset: 0, background: "#00000088", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 } },
    e("div", { style: { background: "#2A2F5A", borderRadius: 14, padding: 24, width: "90%", maxWidth: 400 } },
      e("h3", { style: { fontSize: 18, fontWeight: 700, marginBottom: 16 } }, "Google Apps Script URL"),
      e("input", { type: "text", value: url, onChange: ev => { setUrl(ev.target.value); setErr(""); }, placeholder: "https://script.google.com/...",
        style: { width: "100%", background: "#1B1F3B", border: "1px solid #3D4470", borderRadius: 8, color: "#FFF", fontSize: 14, padding: "10px 12px", outline: "none", boxSizing: "border-box", marginBottom: 12 } }),
      err && e("div", { style: { background: "#F8717122", border: "1px solid #F87171", borderRadius: 8, padding: "8px 12px", marginBottom: 12, color: "#F87171", fontSize: 12 } }, err),
      e("div", { style: { display: "flex", gap: 8 } },
        e("button", { onClick: onClose, style: { ...S.bigBtn, flex: 1, background: "#1B1F3B", border: "1px solid #3D4470", color: "#9BA4B5" } }, "Cancel"),
        e("button", { onClick: handleSave, style: { ...S.bigBtn, flex: 1, background: "#6C63FF", color: "#FFF" } }, "Save"))
    )
  );
}

function InputScreen({ onFetch, onCsvUpload, mappingCount, catCount, onManage, onResume, onDeleteSession, sessions, onSettingsOpen }) {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [uncategorizedCount, setUncategorizedCount] = useState(null);
  const [showSessions, setShowSessions] = useState(false);
  const [confirmDelId, setConfirmDelId] = useState(null);
  const [preview, setPreview] = useState(null);
  const [peekLoading, setPeekLoading] = useState(false);
  const [sortOrder, setSortOrder] = useState("newest");
  const [accountFilter, setAccountFilter] = useState("all");

  const doPeek = async () => {
    const url = storage.get("webapp-url");
    if (!url) return;
    setPeekLoading(true);
    try {
      const response = await fetch(url + (url.includes("?") ? "&" : "?") + "action=peek", { redirect: "follow" });
      const data = response.ok ? await response.json() : JSON.parse(await response.text());
      if (data.transactions && Array.isArray(data.transactions)) {
        const accounts = [...new Set(data.transactions.map(r => (r.accountType || "") + " " + (r.account || "")).filter(Boolean))];
        setPreview({ count: data.transactions.length, accounts });
      }
    } catch (ex) {}
    setPeekLoading(false);
  };

  useEffect(() => { doPeek(); }, []);

  const handleFetch = async () => {
    setLoading(true);
    setErr("");
    setUncategorizedCount(null);

    try {
      const url = storage.get("webapp-url");
      if (!url) {
        setErr("Please configure the Google Apps Script URL first.");
        setLoading(false);
        return;
      }

      const fetchUrl = url + (url.includes("?") ? "&" : "?") + "action=parseAndFetch";
      const response = await fetch(fetchUrl, { redirect: "follow" });
      const data = response.ok ? await response.json() : JSON.parse(await response.text());
      if (!data.transactions || !Array.isArray(data.transactions)) throw new Error("Invalid response");
      let txns = data.transactions.map(transformSheetTransaction);
      // Apply account filter
      if (accountFilter !== "all") {
        txns = txns.filter(t => t.subDesc === accountFilter);
      }
      // Apply sort
      txns.sort((a, b) => {
        const da = a.date || "", db = b.date || "";
        return sortOrder === "newest" ? db.localeCompare(da) : da.localeCompare(db);
      });
      setUncategorizedCount(txns.length);
      onFetch(txns);
    } catch (ex) {
      if (ex.message === "Invalid response") {
        setErr("Failed to parse response. Ensure the web app is deployed and returns JSON.");
      } else {
        setErr("Failed to fetch transactions: " + (ex.message || "Unknown error"));
      }
    } finally {
      setLoading(false);
    }
  };

  const incomplete = sessions.filter(s => sessionStats(s.txns).remaining > 0);
  const complete = sessions.filter(s => sessionStats(s.txns).remaining === 0);
  const webappUrl = storage.get("webapp-url");

  return e("div", { style: S.screen },
    e("div", { style: { padding: "24px 20px", maxWidth: 600, margin: "0 auto" } },
      e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 } },
        e("div", null,
          e("h1", { style: { fontSize: 22, fontWeight: 800, marginBottom: 4 } }, "Transaction Categorizer"),
          e("p", { style: { color: "#9BA4B5", fontSize: 13 } }, "Connect to Google Sheets")),
        e("button", { onClick: onSettingsOpen, style: { background: "none", border: "1px solid #3D4470", borderRadius: 8, color: "#9BA4B5", padding: "6px 10px", cursor: "pointer", fontSize: 16 } }, "\u2699\uFE0F")),

      sessions.length > 0 && e("div", { style: { marginBottom: 20 } },
        e("button", { onClick: () => setShowSessions(!showSessions),
          style: { width: "100%", background: "#151933", border: "1px solid #3D4470", borderRadius: 10, padding: "14px 16px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" } },
          e("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
            e("span", { style: { fontSize: 18 } }, "\uD83D\uDCC2"),
            e("span", { style: { fontSize: 14, fontWeight: 700, color: "#FFF" } }, "Previous Sessions"),
            e("span", { style: { background: "#6C63FF", borderRadius: 10, padding: "2px 8px", fontSize: 11, fontWeight: 700, color: "#FFF" } }, sessions.length)),
          e("span", { style: { color: "#9BA4B5", fontSize: 14, transition: "transform 0.2s", transform: showSessions ? "rotate(180deg)" : "rotate(0)" } }, "\u25BC")),

        showSessions && e("div", { style: { marginTop: 8 } },
          incomplete.length > 0 && e("div", { style: { fontSize: 11, fontWeight: 700, color: "#FBBF24", marginBottom: 8, marginTop: 8, textTransform: "uppercase" } }, "In Progress"),
          incomplete.map(s => {
            const st = sessionStats(s.txns);
            return e("div", { key: s.id, style: { background: "#2A2F5A", borderRadius: 10, borderLeft: "4px solid #FBBF24", padding: "14px 16px", marginBottom: 8, display: "flex", alignItems: "center", gap: 12 } },
              e("div", { style: { flex: 1, cursor: "pointer", minWidth: 0 }, onClick: () => onResume(s.id) },
                e("div", { style: { fontSize: 14, fontWeight: 700, color: "#FFF", marginBottom: 4 } }, sessionLabel(s.txns)),
                e("div", { style: { fontSize: 12, color: "#9BA4B5", marginBottom: 6 } }, st.total + " transactions \u00B7 " + st.catd + " done, " + st.remaining + " remaining"),
                e("div", { style: { background: "#1B1F3B", borderRadius: 4, height: 4, overflow: "hidden" } },
                  e("div", { style: { background: "#FBBF24", height: "100%", width: st.pct + "%", transition: "width 0.3s" } }))),
              confirmDelId === s.id ?
                e("div", { style: { display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 } },
                  e("button", { onClick: () => { onDeleteSession(s.id); setConfirmDelId(null); }, style: { background: "#F87171", border: "none", borderRadius: 4, color: "#FFF", padding: "4px 10px", fontSize: 11, cursor: "pointer", fontWeight: 600 } }, "Delete"),
                  e("button", { onClick: () => setConfirmDelId(null), style: { background: "#1B1F3B", border: "none", borderRadius: 4, color: "#9BA4B5", padding: "4px 10px", fontSize: 11, cursor: "pointer" } }, "Cancel"))
              : e("button", { onClick: () => setConfirmDelId(s.id), style: { background: "none", border: "none", color: "#3D4470", cursor: "pointer", fontSize: 16, padding: "4px 8px", flexShrink: 0 } }, "\u2715"));
          }),
          complete.length > 0 && e("div", { style: { fontSize: 11, fontWeight: 700, color: "#4ADE80", marginBottom: 8, marginTop: 12, textTransform: "uppercase" } }, "Completed"),
          complete.map(s => {
            const st = sessionStats(s.txns);
            return e("div", { key: s.id, style: { background: "#2A2F5A", borderRadius: 10, borderLeft: "4px solid #4ADE80", padding: "14px 16px", marginBottom: 8, display: "flex", alignItems: "center", gap: 12 } },
              e("div", { style: { flex: 1, cursor: "pointer", minWidth: 0 }, onClick: () => onResume(s.id) },
                e("div", { style: { fontSize: 14, fontWeight: 700, color: "#FFF", marginBottom: 4 } }, sessionLabel(s.txns)),
                e("div", { style: { fontSize: 12, color: "#9BA4B5" } }, st.total + " transactions \u00B7 all categorized")),
              confirmDelId === s.id ?
                e("div", { style: { display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 } },
                  e("button", { onClick: () => { onDeleteSession(s.id); setConfirmDelId(null); }, style: { background: "#F87171", border: "none", borderRadius: 4, color: "#FFF", padding: "4px 10px", fontSize: 11, cursor: "pointer", fontWeight: 600 } }, "Delete"),
                  e("button", { onClick: () => setConfirmDelId(null), style: { background: "#1B1F3B", border: "none", borderRadius: 4, color: "#9BA4B5", padding: "4px 10px", fontSize: 11, cursor: "pointer" } }, "Cancel"))
              : e("button", { onClick: () => setConfirmDelId(s.id), style: { background: "none", border: "none", color: "#3D4470", cursor: "pointer", fontSize: 16, padding: "4px 8px", flexShrink: 0 } }, "\u2715"));
          }))),

      e("div", { style: { ...S.txnCard } },
        e("div", { style: { fontSize: 13, color: "#9BA4B5", marginBottom: 8 } }, "Connected to:"),
        e("div", { style: { fontSize: 14, fontWeight: 600, color: "#FFF", wordBreak: "break-all", marginBottom: 12, fontFamily: "monospace", background: "#1B1F3B", padding: 12, borderRadius: 6, minHeight: 40, display: "flex", alignItems: "center" } }, webappUrl || "Not configured"),
        preview && e("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 12 } },
          e("span", { style: { fontSize: 22, fontWeight: 800, color: preview.count > 0 ? "#FBBF24" : "#4ADE80" } }, preview.count),
          e("span", { style: { fontSize: 13, color: "#9BA4B5" } }, "uncategorized transaction" + (preview.count !== 1 ? "s" : "") + " pending"),
          e("button", { onClick: doPeek, disabled: peekLoading, style: { background: "none", border: "none", color: "#6C63FF", cursor: "pointer", fontSize: 12, marginLeft: "auto" } }, peekLoading ? "..." : "\u21BB")),
        uncategorizedCount !== null && e("div", { style: { fontSize: 13, color: "#4ADE80", marginBottom: 8 } }, "\u2713 Fetched " + uncategorizedCount + " transactions")),

      preview && preview.accounts.length > 0 && e("div", { style: { ...S.txnCard, padding: "14px 16px", marginBottom: 12 } },
        e("div", { style: { fontSize: 11, fontWeight: 700, color: "#9BA4B5", marginBottom: 8, textTransform: "uppercase" } }, "Filters"),
        e("div", { style: { display: "flex", gap: 8, alignItems: "center", marginBottom: 10 } },
          e("span", { style: { fontSize: 12, color: "#9BA4B5", flexShrink: 0 } }, "Account:"),
          e("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
            e("button", { onClick: () => setAccountFilter("all"), style: { ...S.groupPill, background: accountFilter === "all" ? "#6C63FF33" : "#1B1F3B", color: accountFilter === "all" ? "#6C63FF" : "#9BA4B5", borderColor: accountFilter === "all" ? "#6C63FF" : "#3D4470" } }, "All"),
            preview.accounts.map(acc => e("button", { key: acc, onClick: () => setAccountFilter(acc), style: { ...S.groupPill, background: accountFilter === acc ? "#6C63FF33" : "#1B1F3B", color: accountFilter === acc ? "#6C63FF" : "#9BA4B5", borderColor: accountFilter === acc ? "#6C63FF" : "#3D4470" } }, acc)))),
        e("div", { style: { display: "flex", gap: 8, alignItems: "center" } },

function App() {
  const [txns, setTxns] = useState([]);
  const [mappings, setMappings] = useState({});
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [phase, setPhase] = useState("input");
  const [copied, setCopied] = useState(false);
  const [history, setHistory] = useState([]);
  const [initKnown, setInitKnown] = useState(0);
  const [sessions, setSessions] = useState([]);
  const [activeSessionId, setActiveSessionId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => {
    const m = storage.get("cat-mappings"); if (m) setMappings(m);
    const c = storage.get("custom-cats"); if (c) setCategories([...DEFAULT_CATEGORIES, ...c]);
    // Migrate old single-session format
    const oldState = storage.get("saved-txn-state");
    if (oldState && oldState.txns && oldState.txns.length > 0) {
      const existing = storage.get("saved-sessions") || [];
      const migrated = { id: "migrated-" + Date.now(), txns: oldState.txns, phase: oldState.phase, initKnown: oldState.initKnown || 0, savedAt: oldState.savedAt || new Date().toISOString() };
      storage.set("saved-sessions", [...existing, migrated]);
      storage.del("saved-txn-state"); storage.del("saved-csv");
    }
    setSessions(storage.get("saved-sessions") || []);
  }, []);

  const saveSessions = (updated) => { storage.set("saved-sessions", updated); setSessions(updated); };

  const saveState = (newTxns, newPhase) => {
    if (!activeSessionId) return;
    const updated = sessions.map(s => s.id === activeSessionId ? { ...s, txns: newTxns, phase: newPhase, initKnown, savedAt: new Date().toISOString() } : s);
    saveSessions(updated);
  };

  const deleteSession = (id) => { saveSessions(sessions.filter(s => s.id !== id)); };

  const saveMap = m => { setMappings(m); storage.set("cat-mappings", m); };
  const saveCats = allCats => { storage.set("custom-cats", allCats.filter(c => !DEFAULT_CATEGORIES.some(d => d.name === c.name))); };

  const pushH = (id, prevCat, prevConf, ph) => setHistory(h => [...h, { id, prevCat, prevConf, phase: ph }]);
  const undo = () => {
    if (!history.length) return;
    const last = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    setTxns(p => {
      const updated = p.map(t => t.id === last.id ? { ...t, category: last.prevCat, confirmed: last.prevConf } : t);
      saveState(updated, last.phase);
      return updated;
    });
    if (last.phase !== phase) setPhase(last.phase);
  };

  const handleFetch = (parsed) => {
    setHistory([]);
    const w = parsed.map(t => { const s = mappings[t.payee.toLowerCase()]; return s ? { ...t, category: s } : t; });
    setTxns(w);
    const k = w.filter(t => t.category).length;
    setInitKnown(k);
    const newPhase = k > 0 ? "confirm" : "categorize";
    setPhase(newPhase);
    const sid = "session-" + Date.now();
    setActiveSessionId(sid);
    const newSession = { id: sid, txns: w, phase: newPhase, initKnown: k, savedAt: new Date().toISOString() };
    const updated = [...sessions, newSession];
    saveSessions(updated);
  };

  const handleResume = (sessionId) => {
    const s = sessions.find(x => x.id === sessionId);
    if (!s) return;
    setTxns(s.txns);
    setInitKnown(s.initKnown || 0);
    setHistory([]);
    setActiveSessionId(s.id);
    const k = s.txns.filter(t => t.category && t.category !== SKIP_CAT && !t.confirmed);
    const u = s.txns.filter(t => !t.category);
    if (s.phase === "confirm" && k.length > 0) setPhase("confirm");
    else if (u.length > 0) setPhase("categorize");
    else setPhase("summary");
  };

  const known = txns.filter(t => t.category && t.category !== SKIP_CAT && !t.confirmed);
  const unknown = txns.filter(t => !t.category);
  const done = txns.filter(t => t.confirmed || t.category === SKIP_CAT).length;
  const progress = txns.length > 0 ? (done / txns.length * 100) : 0;

  const confirmSelected = (ids) => {
    setTxns(p => {
      const u = p.map(x => ids.includes(x.id) ? { ...x, confirmed: true } : x);
      // Sync confirmed ones to sheet
      ids.forEach(id => { const t = u.find(x => x.id === id); if (t && t.category !== SKIP_CAT && t.sheetRow !== undefined) syncManager.add(t.sheetRow, t.category); });
      const remainingKnown = u.filter(t => t.category && t.category !== SKIP_CAT && !t.confirmed);
      const remainingUnknown = u.filter(t => !t.category);
      const newPhase = remainingKnown.length === 0 ? (remainingUnknown.length > 0 ? "categorize" : "summary") : "confirm";
      saveState(u, newPhase);
      setPhase(newPhase);
      return u;
    });
  };
  const rejectSelected = (ids) => {
    setTxns(p => {
      const u = p.map(x => ids.includes(x.id) ? { ...x, category: null, confirmed: false } : x);
      saveState(u, "confirm");
      return u;
    });
  };
  const assign = (id, cat) => {
    const t = txns.find(x => x.id === id);
    pushH(id, t.category, t.confirmed, phase);
    setTxns(p => {
      const u = p.map(x => x.id === id ? { ...x, category: cat, confirmed: true } : x);
      const newPhase = unknown.filter(x => x.id !== id).length === 0 ? "summary" : "categorize";
      saveState(u, newPhase);
      return u;
    });
    if (t && cat !== SKIP_CAT) saveMap({ ...mappings, [t.payee.toLowerCase()]: cat });

    // Send category update to Google Sheet via sync manager
    if (t && cat !== SKIP_CAT && t.sheetRow !== undefined) {
      syncManager.add(t.sheetRow, cat);
    }

    if (unknown.filter(x => x.id !== id).length === 0) setTimeout(() => setPhase("summary"), 200);
  };
  const skip = id => { const t = txns.find(x => x.id === id); pushH(id, t.category, t.confirmed, phase); setTxns(p => { const u = p.map(x => x.id === id ? { ...x, category: SKIP_CAT, confirmed: true } : x); const newPhase = unknown.filter(x => x.id !== id).length === 0 ? "summary" : "categorize"; saveState(u, newPhase); return u; }); if (unknown.filter(x => x.id !== id).length === 0) setTimeout(() => setPhase("summary"), 200); };
  const copy = () => { const rows = txns.filter(t => t.category && t.category !== SKIP_CAT).map(t => t.date + "\t" + t.payee + "\t" + t.category + "\t" + t.subDesc + "\t" + t.amount).join("\n"); navigator.clipboard.writeText(rows).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }); };

  const handleRefresh = async () => {
    const url = storage.get("webapp-url");
    if (!url) return;
    try {
      const refreshUrl = url + (url.includes("?") ? "&" : "?") + "action=parseAndFetch";
      const response = await fetch(refreshUrl, { redirect: "follow" });
      const data = await response.json();
      if (!data.transactions || !Array.isArray(data.transactions)) return;
      const newTxns = data.transactions.map(transformSheetTransaction);
      const existingIds = new Set(txns.map(t => t.id));
      const fresh = newTxns.filter(t => !existingIds.has(t.id));
      if (fresh.length === 0) return;
      const withMappings = fresh.map(t => { const s = mappings[t.payee.toLowerCase()]; return s ? { ...t, category: s } : t; });
      setTxns(p => {
        const merged = [...p, ...withMappings];
        const newKnown = withMappings.filter(t => t.category);
        setInitKnown(prev => prev + newKnown.length);
        const hasUnconfirmed = withMappings.some(t => t.category && !t.confirmed);
        const hasUnknown = withMappings.some(t => !t.category);
        const newPhase = hasUnconfirmed ? "confirm" : (hasUnknown ? "categorize" : phase);
        saveState(merged, newPhase);
        setPhase(newPhase);
        return merged;
      });
    } catch (ex) {}
  };

  const handleCsvUpload = (file) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return;
      const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
      const dateIdx = headers.findIndex(h => h === "date");
      const amountIdx = headers.findIndex(h => h === "amount");
      const payeeIdx = headers.findIndex(h => h === "payee" || h === "merchant" || h === "description" || h === "name");
      const catIdx = headers.findIndex(h => h === "category");
      if (dateIdx < 0 || amountIdx < 0 || payeeIdx < 0) return;
      const parsed = lines.slice(1).map((line, i) => {
        const cols = line.split(",").map(c => c.trim().replace(/^"(.*)"$/, "$1"));
        return {
          id: "csv-" + i,
          date: cols[dateIdx] || "",
          amount: parseFloat(cols[amountIdx]) || 0,
          payee: cols[payeeIdx] || "",
          rawDesc: cols[payeeIdx] || "",
          subDesc: "",
          category: (catIdx >= 0 && cols[catIdx]) ? cols[catIdx] : null,
          timeET: "",
          transactionType: "",
          accountType: "",
        };
      }).filter(t => t.payee);
      if (parsed.length > 0) handleFetch(parsed);
    };
    reader.readAsText(file);
  };

  const syncIndicator = e(SyncIndicator);
  const wrap = (content) => e(React.Fragment, null, content, syncIndicator);

  if (showSettings) return wrap(e(SettingsModal, { onClose: () => setShowSettings(false), onSave: () => setShowSettings(false) }));
  if (phase === "input") return wrap(e(InputScreen, { onFetch: handleFetch, onCsvUpload: handleCsvUpload, mappingCount: Object.keys(mappings).length, catCount: categories.length, onManage: () => setPhase("manage"), onResume: handleResume, onDeleteSession: deleteSession, sessions, onSettingsOpen: () => setShowSettings(true) }));
  if (phase === "manage") return wrap(e(ManageScreen, { categories, onAdd: cat => { if (categories.some(c => c.name.toLowerCase() === cat.name.toLowerCase())) return; const u = [...categories, cat]; setCategories(u); saveCats(u); }, onDelete: name => { const u = categories.filter(c => c.name !== name); setCategories(u); saveCats(u); }, onBack: () => setPhase("input") }));
  if (phase === "confirm" && known.length > 0) return wrap(e(ConfirmScreen, { knownTxns: known, onConfirmSelected: confirmSelected, onRejectSelected: rejectSelected, onSkipAll: () => { setTxns(p => { const u = p.map(t => t.category && !t.confirmed ? { ...t, confirmed: true } : t); saveState(u, unknown.length > 0 ? "categorize" : "summary"); return u; }); setPhase(unknown.length > 0 ? "categorize" : "summary"); }, remaining: known.length, total: initKnown }));
  if ((phase === "categorize" || phase === "confirm") && unknown.length > 0) return wrap(e(CategorizeScreen, { txn: unknown[0], categories, onAssign: assign, onSkip: skip, onDone: () => setPhase("summary"), onUndo: undo, canUndo: history.length > 0, progress, remaining: unknown.length }));
  return wrap(e(SummaryScreen, { transactions: txns, categories, onCopy: copy, onRefresh: handleRefresh, onBack: () => setPhase("categorize"), onRestart: () => { setTxns([]); setPhase("input"); setCopied(false); setHistory([]); setActiveSessionId(null); setSessions(storage.get("saved-sessions") || []); }, copied }));
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
